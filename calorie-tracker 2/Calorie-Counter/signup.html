<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - CalorieCounter</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="page gradient-bg">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <a href="index.html" class="logo">
            <svg class="logo-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
            </svg>
            <span class="logo-text">CalorieCounter</span>
          </a>
        </div>

  <form id="signupForm" class="auth-form">
  <div id="error-message" class="error-message" style="display: none;"></div>
  <div class="form-group">
    <label for="name">Full Name</label>
    <input type="text" id="name" name="name" required>
  </div>
  <div class="form-group">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" required>
  </div>
  <div class="form-group">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>
  </div>
  <div class="form-group">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" required minlength="6">
  </div>
  <div class="form-group">
    <label for="dob">Date of Birth</label>
    <input type="date" id="dob" name="dob" required>
  </div>
  <div class="form-group">
    <label for="gender">Gender</label>
    <select id="gender" name="gender" required>
      <option value="">Select…</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
      <option value="other">Other</option>
    </select>
  </div>
  <div class="form-group">
    <label for="weightKg">Weight (kg)</label>
    <input type="number" id="weightKg" name="weightKg" required>
  </div>
  <div class="form-group">
    <label for="heightCm">Height (cm)</label>
    <input type="number" id="heightCm" name="heightCm" required>
  </div>
  <button type="submit" class="btn btn-primary btn-full">Sign Up</button>
</form>

        <p class="auth-footer">
          Already have an account? <a href="login.html">Login</a>
        </p>
      </div>
    </div>
  </div>
