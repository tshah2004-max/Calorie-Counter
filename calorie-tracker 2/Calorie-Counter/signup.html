<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - CalorieCounter</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="page gradient-bg">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <a href="index.html" class="logo">
            <svg class="logo-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
            </svg>
            <span class="logo-text">CalorieCounter</span>
          </a>
        </div>

        <h2>Create your account</h2>
        <p class="auth-subtitle">Start tracking your calories today</p>

        <form id="signupForm" class="auth-form">
          <div id="error-message" class="error-message" style="display: none;"></div>

          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="6">
          </div>

          <button type="submit" class="btn btn-primary btn-full">Sign Up</button>
        </form>

        <p class="auth-footer">
          Already have an account? <a href="login.html">Login</a>
        </p>
        <script>
          const API ="[localhost](http://localhost:3000)";
          const signupForm = document.getElementById("signupForm");
          if (signupForm) {
            signupForm.addEventListener("submit", async (e) => {
              e.preventDefault();
              const errorEl = document.getElementById("error-message");
              errorEl.style.display = "none";
              const name = document.getElementById("name").value.trim();
              const email = document.getElementById("email").value.trim();
              const password = document.getElementById("password").value.trim();
              if (!name) {
                errorEl.textContent = "Please enter your full name.";
                errorEl.style.display = "block";
                return;
              }
              const emailPattern = /^[^\s@]+@^\s@]+\.[^\s@]+$/;
              if (!emailPattern.test(email)) {
                errorEl.textContent = "Please enter a valid email address.";
                errorEl.style.Display = "block";
                return;
              }
              if (password.length < 6) {
                errorEl.textContent = "Password must be at least 6 characters long.";
                errorEl.style.display = "block";
                return;
              }
              try {
                const res = await fetch('${API}/auth/registrer', {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body:JSON.stringify({ displayName: name, email, password }),
                });
                const data = await res.json();
                if (!res.ok) {
                  errorEl.textContent = data.error || "Registraion failed.";
                  errorEl.style.display = "block";
                  return;
                }
                //auto login
                localStorage.setItem("token", data.token);
                localStorage.setItem("userId", data.userid);
                window.location.href = "setprofile.html";
              } catch (err) {
                errorEl.textContent = "Server error. Please try again.";
                errorEl.style.display = "block";
              }
            });
          }                               
        </script>
      </div>
    </div>
  </div>
